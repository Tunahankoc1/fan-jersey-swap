function loadLiveData() {
  fetch("https://worldcup26.ir/get/games", {
    headers: { "Authorization": "Bearer " + WC_TOKEN }
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    allGames = data.games || [];
    liveTeams = {}; hotTeams = {}; eliminatedTeams = {};
    var liveCount = 0;
    var teamWins = {}; var teamGames = {};

    allGames.forEach(function(g) {
      var home = g.home_team_name_en;
      var away = g.away_team_name_en;
      var status = g.time_elapsed;
      var hs = parseInt(g.home_score) || 0;
      var as = parseInt(g.away_score) || 0;

      if (status === "notstarted") { liveTeams[home] = true; liveTeams[away] = true; liveCount++; }
      if (status === "finished") {
        if (hs > as) hotTeams[home] = (hotTeams[home] || 0) + 1;
        else if (as > hs) hotTeams[away] = (hotTeams[away] || 0) + 1;
      }
      if (g.type === "group" && status === "finished") {
        teamGames[home] = (teamGames[home] || 0) + 1;
        teamGames[away] = (teamGames[away] || 0) + 1;
        if (hs > as) teamWins[home] = (teamWins[home] || 0) + 1;
        if (as > hs) teamWins[away] = (teamWins[away] || 0) + 1;
      }
    });

    teams.forEach(function(t) {
      var wins = teamWins[t.name] || 0;
      var games = teamGames[t.name] || 0;
      if (games >= 3) {
        if (wins === 3) t.odds = Math.max(t.odds * 0.5, 3);
        if (wins === 0) { t.odds = t.odds * 1.5; eliminatedTeams[t.name] = true; }
      }
    });

    document.getElementById("liveCount").textContent = liveCount;
    renderMarketplace();
    renderMatchList();
    addLog("✓ Live data loaded — " + allGames.length + " matches");
  })
  .catch(function(e) { addLog("Live data error: " + e.message); });
}

function getRarity(odds) {
  if (odds <= 6) return { label: "LEGENDARY", cls: "rarity-legendary" };
  if (odds <= 10) return { label: "EPIC", cls: "rarity-epic" };
  if (odds <= 20) return { label: "RARE", cls: "rarity-rare" };
  return { label: "COMMON", cls: "rarity-common" };
}

function getPrice(odds) { return (1 / odds * 2).toFixed(3); }

function getTrend(name) {
  var wins = hotTeams[name] || 0;
  if (wins >= 3) return '<span style="color:#10b981;">▲ HOT +' + wins + ' wins</span>';
  if (wins >= 1) return '<span style="color:#60a5fa;">▲ ' + wins + ' win(s)</span>';
  if (eliminatedTeams[name]) return '<span style="color:#ef4444;">▼ Eliminated</span>';
  if (liveTeams[name]) return '<span style="color:#f59e0b;">⚡ Playing soon</span>';
  return '<span style="color:#7c7c9e;">— Stable</span>';
}

function cardHTML(t, i, mode) {
  var rarity = getRarity(t.odds);
  var price = getPrice(t.odds);
  var isOwned = minted[i];
  var isListed = swapListed[i];
  var isHot = (hotTeams[t.name] || 0) >= 2;
  var isLive = liveTeams[t.name];
  var isElim = eliminatedTeams[t.name];

  var classes = "jersey-card" + (isOwned ? " owned" : "") + (isHot ? " hot" : "") + (isElim ? " eliminated" : "");
  var html = "<div class='" + classes + "'>";
  if (isHot) html += "<div class='hot-badge'>🔥 HOT</div>";
  if (isLive && !isHot) html += "<div class='match-badge'>⚡ SOON</div>";
  if (isElim && !isHot) html += "<div class='elim-badge'>OUT</div>";

  html += "<div class='jersey-img'><img src='" + t.img + "' onerror='this.style.display=\"none\"' loading='lazy'></div>";
  html += "<div class='jersey-team'>" + t.name + "</div>";
  html += "<div class='jersey-odds'>Odds: " + t.odds.toFixed(1) + "x</div>";
  html += "<div class='jersey-value'>" + price + " SOL</div>";
  html += "<div class='jersey-trend'>" + getTrend(t.name) + "</div>";
  html += "<div class='jersey-rarity " + rarity.cls + "'>" + rarity.label + "</div>";

  if (mode === "market") {
    if (isOwned) html += "<div style='color:#818cf8; font-size:11px; margin-bottom:5px;'>✓ Owned</div>";
    else html += "<button class='mint-btn' data-i='" + i + "'>Mint Jersey</button>";
  } else if (mode === "collection") {
    if (isListed) html += "<div style='color:#a78bfa; font-size:11px;'>Listed for Swap</div>";
    else html += "<button class='swap-btn' data-i='" + i + "'>List for Swap</button>";
  } else if (mode === "swap") {
    html += "<div style='color:#7c7c9e; font-size:11px; margin-bottom:5px;'>Listed by fan</div>";
    html += "<button class='mint-btn' data-i='" + i + "'>Swap Now</button>";
  }
  html += "</div>";
  return html;
}

function renderMarketplace() {
  var sorted = teams.map(function(t, i) { return { t: t, i: i }; });
  sorted.sort(function(a, b) { return (hotTeams[b.t.name] || 0) - (hotTeams[a.t.name] || 0); });
  var html = "";
  sorted.forEach(function(obj) { html += cardHTML(obj.t, obj.i, "market"); });
  document.getElementById("jerseyGrid").innerHTML = html;
  document.querySelectorAll("#jerseyGrid .mint-btn").forEach(function(btn) {
    btn.addEventListener("click", function() { mintJersey(parseInt(btn.getAttribute("data-i"))); });
  });
  updateStats();
}

function renderCollection() {
  var html = ""; var count = 0;
  teams.forEach(function(t, i) { if (minted[i]) { count++; html += cardHTML(t, i, "collection"); } });
  if (count === 0) html = "<div style='color:#7c7c9e; padding:20px;'>No jerseys yet. Mint from Marketplace!</div>";
  document.getElementById("myGrid").innerHTML = html;
  document.querySelectorAll("#myGrid .swap-btn").forEach(function(btn) {
    btn.addEventListener("click", function() { listForSwap(parseInt(btn.getAttribute("data-i"))); });
  });
}

function renderSwapMarket() {

  teams.forEach(function(t, i) { if (swapListed[i]) { count++; html += cardHTML(t, i, "swap"); } });
  if (count === 0) html = "<div style='color:#7c7c9e; padding:20px;'>No jerseys listed yet.</div>";
  document.getElementById("swapGrid").innerHTML = html;
  document.querySelectorAll("#swapGrid .mint-btn").forEach(function(btn) {

function renderMatchList() {
  var filtered = currentFilter === "all" ? allGames : allGames.filter(function(g) { return g.time_elapsed === currentFilter; });
  var html = "";
  filtered.forEach(function(g) {
    var status = g.time_elapsed;
    var cardClass = status === "notstarted" ? "upcoming" : "finished";
    var statusHTML = status === "notstarted"
      ? '<span style="color:#7c3aed;">⏰ Upcoming</span>'
      : '<span style="color:#6b7280;">✓ Finished</span>';
    var scoreHTML = status === "notstarted"
      ? '<div class="match-score" style="font-size:14px; color:#7c7c9e;">VS</div>'
      : '<div class="match-score">' + g.home_score + ' - ' + g.away_score + '</div>';

    html += '<div class="match-card ' + cardClass + '">';
    html += '<div><div class="match-teams">' + (g.home_team_name_en || "TBD") + '</div></div>';
    html += scoreHTML;
    html += '<div><div class="match-teams" style="text-align:right;">' + (g.away_team_name_en || "TBD") + '</div>';
    html += '<div class="match-info">' + statusHTML + '</div>';
    html += '<div class="match-info">' + (g.local_date || "") + '</div>';
    html += '<div class="match-info" style="color:#a78bfa;">' + (g.group || "") + '</div></div>';
    html += '</div>';
  });
  if (filtered.length === 0) html = '<div style="color:#7c7c9e; padding:20px; text-align:center;">No matches found</div>';
  document.getElementById("matchList").innerHTML = html;
}

function filterMatches(el, filter) {
  currentFilter = filter;
  document.querySelectorAll(".filter-btn").forEach(function(b) { b.classList.remove("active"); });
  el.classList.add("active");
  renderMatchList();
}

async function sendTx(memo) {
  var connection = new solanaWeb3.Connection("https://api.devnet.solana.com", "confirmed");
  var pubkey = wallet.publicKey;
  var tx = new solanaWeb3.Transaction().add(
    new solanaWeb3.TransactionInstruction({
      keys: [{ pubkey: pubkey, isSigner: true, isWritable: false }],
      programId: new solanaWeb3.PublicKey("MemoSq4gqABAXKb96qnH8TysNcWxMyWCqXgDLGmfcHr"),
      data: Buffer.from(memo)
    })
  );
  tx.feePayer = pubkey;
  var bh = await connection.getLatestBlockhash();
  tx.recentBlockhash = bh.blockhash;
  var signed = await wallet.signTransaction(tx);
  return await connection.sendRawTransaction(signed.serialize());
}

async function mintJersey(i) {
  if (!wallet) { addLog("Connect wallet first!"); return; }
  try {
    addLog("Minting " + teams[i].name + "...");
    var txid = await sendTx("FanJerseySwap:mint:" + teams[i].name + ":odds=" + teams[i].odds);
    minted[i] = txid;
    addLog("✓ Minted " + teams[i].name + "!");
    addLog('<a style="color:#a78bfa;" href="https://explorer.solana.com/tx/' + txid + '?cluster=devnet" target="_blank">' + txid.slice(0,20) + "...</a>");
    renderMarketplace(); renderCollection(); updateStats();
  } catch(e) { addLog("Error: " + e.message); }
}

async function listForSwap(i) {
  if (!wallet) { addLog("Connect wallet first!"); return; }
  try {
    addLog("Listing " + teams[i].name + "...");
    await sendTx("FanJerseySwap:list:" + teams[i].name);
    swapListed[i] = true;
    addLog("✓ Listed " + teams[i].name + "!");
    renderCollection(); renderSwapMarket();
  } catch(e) { addLog("Error: " + e.message); }
}

async function swapJersey(i) {
  if (!wallet) { addLog("Connect wallet first!"); return; }
  try {
    addLog("Swapping " + teams[i].name + "...");
    var txid = await sendTx("FanJerseySwap:swap:" + teams[i].name);
    swapListed[i] = false; minted[i] = txid; swapCount++;
    addLog("✓ Swapped " + teams[i].name + "!");
    addLog('<a style="color:#a78bfa;" href="https://explorer.solana.com/tx/' + txid + '?cluster=devnet" target="_blank">' + txid.slice(0,20) + "...</a>");
    renderCollection(); renderSwapMarket(); updateStats();
  } catch(e) { addLog("Error: " + e.message); }
}

function updateStats() {
  var count = Object.keys(minted).length;
  document.getElementById("totalMinted").textContent = count;
  document.getElementById("totalOwned").textContent = count;
  document.getElementById("totalSwaps").textContent = swapCount;
  var hotName = "-"; var maxWins = 0;
  Object.keys(hotTeams).forEach(function(name) {
    if (hotTeams[name] > maxWins) { maxWins = hotTeams[name]; hotName = name; }
  });
  document.getElementById("hotTeam").textContent = hotName;
}

function showTab(el) {
  document.querySelectorAll(".section").forEach(function(s) { s.classList.remove("active"); });
  document.querySelectorAll(".tab").forEach(function(t) { t.classList.remove("active"); });
  var tab = el.getAttribute("data-tab");
  document.getElementById(tab).classList.add("active");
  el.classList.add("active");
  if (tab === "collection") renderCollection();
  if (tab === "swap") renderSwapMarket();
  if (tab === "matches") renderMatchList();
}

function addLog(msg) {
  var div = document.createElement("div");
  div.style.margin = "3px 0";
  div.innerHTML = msg;
  document.getElementById("log").appendChild(div);
  document.getElementById("log").scrollTop = 9999;
}

document.getElementById("connectBtn").addEventListener("click", function() {
  if (!window.solana) { addLog("Phantom not found!"); return; }
  window.solana.connect().then(function(r) {
    wallet = window.solana;
    document.getElementById("walletAddr").textContent = r.publicKey.toString().slice(0,8) + "...";
    document.getElementById("connectBtn").textContent = "Connected";
    addLog("✓ Connected: " + r.publicKey.toString().slice(0,8) + "...");
  }).catch(function(e) { addLog("Error: " + e.message); });
});

loadLiveData();
setInterval(loadLiveData, 300000);
</script>
</body>
</html>
