* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a1a; color: #f1ede2; font-family: Arial, sans-serif; padding: 20px; }
h1 { font-size: 28px; color: #d4a843; text-align: center; margin-bottom: 5px; }
.subtitle { text-align: center; color: #b9c4ba; font-size: 12px; margin-bottom: 20px; }
.topbar { display: flex; justify-content: space-between; align-items: center; background: #15301f; border: 1px solid #2a4a36; padding: 10px 20px; border-radius: 8px; margin-bottom: 20px; }
button { padding: 10px 20px; background: #d4a843; color: #0a0a1a; border: none; cursor: pointer; font-weight: bold; border-radius: 6px; }
button:hover { background: #e6b84d; }
.tabs { display: flex; gap: 10px; margin-bottom: 20px; }
.tab { padding: 10px 20px; background: #15301f; border: 1px solid #2a4a36; cursor: pointer; border-radius: 6px; color: #b9c4ba; }
.tab.active { background: #d4a843; color: #0a0a1a; font-weight: bold; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
.jersey-card { background: #15301f; border: 1px solid #2a4a36; border-radius: 10px; padding: 15px; text-align: center; transition: all 0.2s; }
.jersey-card:hover { border-color: #d4a843; transform: translateY(-2px); }
.jersey-card.owned { border-color: #4a7a4a; }
.jersey-img { height: 100px; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }
.jersey-team { font-size: 13px; font-weight: bold; margin-bottom: 4px; }
.jersey-odds { font-size: 11px; color: #b9c4ba; margin-bottom: 4px; }
.jersey-value { font-size: 13px; color: #d4a843; font-weight: bold; margin-bottom: 8px; }
.jersey-rarity { font-size: 10px; padding: 3px 8px; border-radius: 10px; display: inline-block; margin-bottom: 8px; }
.rarity-common { background: #2a4a36; color: #6abf6a; }
.rarity-rare { background: #2a2a4a; color: #6a6abf; }
.rarity-epic { background: #4a2a4a; color: #bf6abf; }
.rarity-legendary { background: #4a3a0a; color: #d4a843; }
.mint-btn { width: 100%; padding: 7px; background: #d4a843; color: #0a0a1a; border: none; cursor: pointer; font-weight: bold; border-radius: 6px; font-size: 11px; }
.swap-btn { width: 100%; padding: 7px; background: #2a4a7a; color: #f1ede2; border: none; cursor: pointer; font-weight: bold; border-radius: 6px; font-size: 11px; margin-top: 5px; }
#log { background: #15301f; border: 1px solid #2a4a36; padding: 15px; border-radius: 8px; margin-top: 20px; font-size: 11px; color: #b9c4ba; max-height: 150px; overflow-y: auto; }
.section { display: none; }
.section.active { display: block; }
.stats-bar { background: #0a0a1a; border: 1px solid #2a4a36; padding: 10px; border-radius: 6px; margin-bottom: 15px; display: flex; gap: 20px; font-size: 12px; flex-wrap: wrap; }
.stat { text-align: center; }
.stat-val { color: #d4a843; font-weight: bold; font-size: 16px; }

  <div class="stat"><div class="stat-val" id="totalSwaps">0</div><div>Swaps</div></div>
  <div class="stat"><div class="stat-val" id="hotTeam">-</div><div>Hottest Team</div></div>

<div class="tabs">
  <div class="tab active" data-tab="marketplace" onclick="showTab(this)">🏪 Marketplace</div>
  <div class="tab" data-tab="collection" onclick="showTab(this)">👕 My Collection</div>

function drawJersey(t) {
  var b = t.body, s = t.sleeve, bd = t.band;
  return '<svg width="75" height="90" viewBox="0 0 75 90">' +
    '<path d="M28 4 L8 18 L3 38 L16 40 L16 82 L59 82 L59 40 L72 38 L67 18 L47 4 L40 10 L37 7 L34 10 Z" fill="' + b + '" stroke="#22222288" stroke-width="1.2"/>' +
    '<path d="M28 4 L8 18 L3 38 L16 40 L16 24 L26 16 Z" fill="' + s + '" stroke="#22222288" stroke-width="1"/>' +
    '<path d="M47 4 L67 18 L72 38 L59 40 L59 24 L49 16 Z" fill="' + s + '" stroke="#22222288" stroke-width="1"/>' +
    '<rect x="16" y="30" width="43" height="14" fill="' + bd + '" opacity="0.85"/>' +
    '<path d="M34 4 L34 10 L37 7 L40 10 L40 4 Q37 1 34 4 Z" fill="' + bd + '" stroke="#22222288" stroke-width="0.8"/>' +
    '</svg>';
}

function getRarity(odds) {
  if (odds <= 6) return { label: "LEGENDARY", cls: "rarity-legendary" };
  if (odds <= 10) return { label: "EPIC", cls: "rarity-epic" };
  if (odds <= 20) return { label: "RARE", cls: "rarity-rare" };
  return { label: "COMMON", cls: "rarity-common" };
}

function getPrice(odds) {
  return (1 / odds * 2).toFixed(3);
}

function cardHTML(t, i, mode) {
  var rarity = getRarity(t.odds);
  var price = getPrice(t.odds);
  var isOwned = minted[i];
  var isListed = swapListed[i];
  var html = "<div class='jersey-card" + (isOwned ? " owned" : "") + "'>";
  html += "<div class='jersey-img'>" + drawJersey(t) + "</div>";
  html += "<div class='jersey-team'>" + t.name + "</div>";
  html += "<div class='jersey-odds'>Odds: " + t.odds + "x</div>";
  html += "<div class='jersey-value'>" + price + " SOL</div>";
  html += "<div class='jersey-rarity " + rarity.cls + "'>" + rarity.label + "</div>";
  if (mode === "market") {
    if (isOwned) {
      html += "<div style='color:#6abf6a; font-size:11px; margin-bottom:5px;'>✓ Owned</div>";
    } else {
      html += "<button class='mint-btn' data-i='" + i + "'>Mint Jersey</button>";
    }
  } else if (mode === "collection") {
    if (isListed) {
      html += "<div style='color:#d4a843; font-size:11px;'>Listed for Swap</div>";
    } else {
      html += "<button class='swap-btn' data-i='" + i + "'>List for Swap</button>";
    }
  } else if (mode === "swap") {
    html += "<div style='color:#b9c4ba; font-size:11px; margin-bottom:5px;'>Listed by fan</div>";
    html += "<button class='mint-btn' data-i='" + i + "'>Swap Now</button>";
  }
  html += "</div>";
  return html;
}

function renderMarketplace() {
  var html = "";
  teams.forEach(function(t, i) { html += cardHTML(t, i, "market"); });
  document.getElementById("jerseyGrid").innerHTML = html;
  document.querySelectorAll("#jerseyGrid .mint-btn").forEach(function(btn) {
    btn.addEventListener("click", function() { mintJersey(parseInt(btn.getAttribute("data-i"))); });
  });
  updateStats();
}

function renderCollection() {
  var html = "";
  var count = 0;
  teams.forEach(function(t, i) {
    if (minted[i]) { count++; html += cardHTML(t, i, "collection"); }
  });
  if (count === 0) html = "<div style='color:#b9c4ba; padding:20px;'>No jerseys yet. Mint from Marketplace!</div>";
  document.getElementById("myGrid").innerHTML = html;
  document.querySelectorAll("#myGrid .swap-btn").forEach(function(btn) {
    btn.addEventListener("click", function() { listForSwap(parseInt(btn.getAttribute("data-i"))); });
  });
}

function renderSwapMarket() {
  var html = "";
  var count = 0;
  teams.forEach(function(t, i) {
    if (swapListed[i]) { count++; html += cardHTML(t, i, "swap"); }
  });
  if (count === 0) html = "<div style='color:#b9c4ba; padding:20px;'>No jerseys listed yet.</div>";
  document.getElementById("swapGrid").innerHTML = html;
  document.querySelectorAll("#swapGrid .mint-btn").forEach(function(btn) {
    btn.addEventListener("click", function() { swapJersey(parseInt(btn.getAttribute("data-i"))); });
  });
}

async function sendTx(memo) {
  var connection = new solanaWeb3.Connection("https://api.devnet.solana.com", "confirmed");
  var pubkey = wallet.publicKey;
  var tx = new solanaWeb3.Transaction().add(
    new solanaWeb3.TransactionInstruction({
      keys: [{ pubkey: pubkey, isSigner: true, isWritable: false }],
      programId: new solanaWeb3.PublicKey("MemoSq4gqABAXKb96qnH8TysNcWxMyWCqXgDLGmfcHr"),
      data: Buffer.from(memo)
    })
  );
  tx.feePayer = pubkey;
  var bh = await connection.getLatestBlockhash();
  tx.recentBlockhash = bh.blockhash;
  var signed = await wallet.signTransaction(tx);
  return await connection.sendRawTransaction(signed.serialize());
}

async function mintJersey(i) {
  if (!wallet) { addLog("Connect wallet first!"); return; }
  try {
    addLog("Minting " + teams[i].name + "...");
    var txid = await sendTx("FanJerseySwap:mint:" + teams[i].name + ":odds=" + teams[i].odds);
    minted[i] = txid;
    addLog("✓ Minted " + teams[i].name + "!");
    addLog('<a style="color:#d4a843;" href="https://explorer.solana.com/tx/' + txid + '?cluster=devnet" target="_blank">' + txid.slice(0,20) + "...</a>");
    renderMarketplace(); renderCollection(); updateStats();
  } catch(e) { addLog("Error: " + e.message); }
}

async function listForSwap(i) {
  if (!wallet) { addLog("Connect wallet first!"); return; }
  try {
    addLog("Listing " + teams[i].name + "...");
    await sendTx("FanJerseySwap:list:" + teams[i].name);
    swapListed[i] = true;
    addLog("✓ Listed " + teams[i].name + "!");
    renderCollection(); renderSwapMarket();
  } catch(e) { addLog("Error: " + e.message); }
}

async function swapJersey(i) {
  if (!wallet) { addLog("Connect wallet first!"); return; }
  try {
    addLog("Swapping " + teams[i].name + "...");
    var txid = await sendTx("FanJerseySwap:swap:" + teams[i].name);
    swapListed[i] = false; minted[i] = txid; swapCount++;
    addLog("✓ Swapped " + teams[i].name + "!");
    addLog('<a style="color:#d4a843;" href="https://explorer.solana.com/tx/' + txid + '?cluster=devnet" target="_blank">' + txid.slice(0,20) + "...</a>");
    renderCollection(); renderSwapMarket(); updateStats();
  } catch(e) { addLog("Error: " + e.message); }
}

function updateStats() {
  var count = Object.keys(minted).length;
  document.getElementById("totalMinted").textContent = count;
  document.getElementById("totalOwned").textContent = count;
  document.getElementById("totalSwaps").textContent = swapCount;
  var hotOdds = 999; var hotTeam = "-";
  teams.forEach(function(t, i) {
    if (minted[i] && t.odds < hotOdds) { hotOdds = t.odds; hotTeam = t.name; }
  });
  document.getElementById("hotTeam").textContent = hotTeam;
}

function showTab(el) {
  document.querySelectorAll(".section").forEach(function(s) { s.classList.remove("active"); });
  document.querySelectorAll(".tab").forEach(function(t) { t.classList.remove("active"); });
  var tab = el.getAttribute("data-tab");
  document.getElementById(tab).classList.add("active");
  el.classList.add("active");
  if (tab === "collection") renderCollection();
  if (tab === "swap") renderSwapMarket();
}

function addLog(msg) {
  var div = document.createElement("div");
  div.style.margin = "3px 0";
  div.innerHTML = msg;
  document.getElementById("log").appendChild(div);
  document.getElementById("log").scrollTop = 9999;
}

document.getElementById("connectBtn").addEventListener("click", function() {
  if (!window.solana) { addLog("Phantom not found!"); return; }
  window.solana.connect().then(function(r) {
    wallet = window.solana;
    document.getElementById("walletAddr").textContent = r.publicKey.toString().slice(0,8) + "...";
    document.getElementById("connectBtn").textContent = "Connected";
    addLog("✓ Connected: " + r.publicKey.toString().slice(0,8) + "...");
  }).catch(function(e) { addLog("Error: " + e.message); });
});

renderMarketplace();
</script>
